<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">전체 관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<main class="content" style="padding:24px;">
    <div class="content-head">
        <h1 class="page-title" th:text="${title}">전체 관리자 대시보드</h1>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn">로그아웃</button>
        </form>
    </div>
    <div class="panel">
        <h2>스캐폴딩 완료</h2>
        <p>기반(인증·보안·레이아웃)이 준비되었습니다. 다음 단계에서 박람회 관리·예약·결제·LMS를 구현합니다.</p>
        <ul>
            <li>M2 박람회·예약 &nbsp;·&nbsp; M3 결제·QR·체크인 &nbsp;·&nbsp; M4 관리자 &nbsp;·&nbsp; M5 LMS</li>
        </ul>
    </div>
</main>
</body>
</html>
