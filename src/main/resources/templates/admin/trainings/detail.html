<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${training.title}">교육 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar('trainings')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/layout :: topbar('교육 관리')}"></header>
        <main class="content">
            <div class="content-head">
                <h1 class="page-title" th:text="${training.title}">교육</h1>
                <a class="btn" th:href="@{/admin/trainings}">목록으로</a>
            </div>

            <div class="flash success" th:if="${message}" th:text="${message}"></div>
            <div class="flash error" th:if="${error}" th:text="${error}"></div>

            <div class="panel">
                <div class="info-row"><span class="label">YouTube</span>
                    <a th:href="${training.youtubeUrl}" th:text="${training.youtubeUrl}" target="_blank">링크</a></div>
                <div class="info-row"><span class="label">설명</span><span th:text="${training.description}">-</span></div>
            </div>

            <div class="panel">
                <h2>교육 배정</h2>
                <form class="row-form" method="post" th:action="@{/admin/trainings/{id}/assign(id=${training.id})}">
                    <select name="assigneeId" required>
                        <option value="">박람회 관리자 선택</option>
                        <option th:each="c : ${candidates}" th:value="${c.id}" th:text="${c.name}">대상</option>
                    </select>
                    <button type="submit" class="btn">배정</button>
                </form>
            </div>

            <div class="panel">
                <h2>수강율</h2>
                <table class="data-table" th:unless="${assignments.isEmpty()}">
                    <thead><tr><th>대상자</th><th>시청률</th><th>상태</th><th>이수일</th></tr></thead>
                    <tbody>
                    <tr th:each="a : ${assignments}">
                        <td th:text="${a.assignee.name}">대상</td>
                        <td class="num" th:text="${#numbers.formatDecimal(a.progressRate, 1, 1)} + '%'">0.0%</td>
                        <td><span class="badge"
                                  th:classappend="${a.status.name() == 'COMPLETED' ? 'green' : (a.status.name() == 'IN_PROGRESS' ? 'cyan' : '')}"
                                  th:text="${a.status.label}">상태</span></td>
                        <td style="font-size:13px;color:var(--text-muted);"
                            th:text="${a.completedAt != null} ? ${#temporals.format(a.completedAt, 'yyyy-MM-dd HH:mm')} : '-'">-</td>
                    </tr>
                    </tbody>
                </table>
                <div class="table-empty" th:if="${assignments.isEmpty()}">배정된 대상이 없습니다.</div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
