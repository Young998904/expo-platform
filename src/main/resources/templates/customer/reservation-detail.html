<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'예약 ' + ${reservation.reservationNo}">예약 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="portal-top">
    <a th:href="@{/customer/home}" class="portal-brand" style="text-decoration:none;">expo<span>·portal</span></a>
    <div style="display:flex;gap:14px;align-items:center;">
        <a th:href="@{/customer/reservations}" style="color:#CFE3E8;font-size:14px;">내 예약</a>
        <form th:action="@{/customer/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-text" style="color:#fff;">로그아웃</button>
        </form>
    </div>
</header>

<main class="portal-content">
    <div class="content-head">
        <h1 class="page-title">예약 상세
            <span class="badge"
                  th:classappend="${reservation.status.name() == 'CONFIRMED' ? 'cyan' : (reservation.status.name() == 'CHECKED_IN' ? 'green' : (reservation.status.name() == 'PENDING' ? 'orange' : ''))}"
                  th:text="${reservation.status.label}">상태</span>
        </h1>
        <a class="btn" th:href="@{/customer/reservations}">목록으로</a>
    </div>

    <div class="flash success" th:if="${message}" th:text="${message}"></div>
    <div class="flash error" th:if="${error}" th:text="${error}"></div>

    <div class="stepline">
        <div class="step" th:classappend="${reservation.status.ordinal() >= 0} ? 'done'">결제대기</div>
        <div class="step" th:classappend="${reservation.status.ordinal() >= 1} ? 'done'">예약확정</div>
        <div class="step" th:classappend="${reservation.status.ordinal() >= 2} ? 'done'">입장완료</div>
    </div>

    <!-- 결제대기: 결제 진행 -->
    <div class="panel" th:if="${reservation.status.name() == 'PENDING'}">
        <h2>결제</h2>
        <div>청구 금액 <b class="price" th:text="${#numbers.formatInteger(reservation.amount, 0, 'COMMA')} + '원'">0원</b></div>
        <!-- 실제 PortOne 연동(키 설정 시): 카카오페이 결제창 호출 -->
        <button th:if="${portoneEnabled}" type="button" class="btn kakao" style="margin-top:12px;" onclick="payWithKakao()">
            카카오페이로 결제
        </button>

        <!-- 키 미설정(데모): 카카오페이 결제창 시뮬레이션 후 Mock 확정 -->
        <div th:unless="${portoneEnabled}" style="margin-top:12px;">
            <form id="mockPayForm" th:action="@{/customer/reservations/{id}/pay(id=${reservation.id})}" method="post" hidden></form>
            <button type="button" class="btn kakao" onclick="openKakao()">카카오페이로 결제</button>
            <span class="eyebrow" style="margin-left:8px;">테스트 모드 · 실제 청구 없음</span>
        </div>
    </div>

    <!-- 카카오페이 결제창(시뮬레이션) — 데모 환경의 결제대기 예약에서만 노출 -->
    <div th:if="${!portoneEnabled and reservation.status.name() == 'PENDING'}" id="kakaoModal" class="kakao-modal" hidden>
        <div class="kakao-modal__backdrop" onclick="closeKakao()"></div>
        <div class="kakao-modal__sheet" role="dialog" aria-modal="true" aria-label="카카오페이 결제">
            <div class="kakao-modal__head"><span class="kakao-modal__logo">pay</span><span>카카오페이</span></div>
            <div class="kakao-modal__body">
                <div class="kakao-modal__order" th:text="${reservation.expo.title}">행사</div>
                <div class="kakao-modal__amount" th:text="${#numbers.formatInteger(reservation.amount, 0, 'COMMA')} + '원'">0원</div>
                <div class="kakao-modal__row"><span>결제수단</span><b>카카오페이 머니</b></div>
                <div class="kakao-modal__row"><span>결제금액</span><b th:text="${#numbers.formatInteger(reservation.amount, 0, 'COMMA')} + '원'">0원</b></div>
                <div class="kakao-modal__note">테스트 결제입니다. 실제 청구는 발생하지 않습니다.</div>
            </div>
            <div class="kakao-modal__actions">
                <button type="button" class="btn" onclick="closeKakao()">취소</button>
                <button type="button" class="btn kakao" onclick="document.getElementById('mockPayForm').submit()">결제하기</button>
            </div>
        </div>
    </div>

    <!-- 확정/입장: 디지털 입장 배지 -->
    <div class="ticket" th:if="${reservation.status.name() == 'CONFIRMED' or reservation.status.name() == 'CHECKED_IN'}"
         style="max-width:380px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="ticket__eyebrow">ADMISSION</span>
            <span class="badge" th:classappend="${reservation.status.name() == 'CHECKED_IN'} ? 'green' : 'cyan'"
                  th:text="${reservation.status.name() == 'CHECKED_IN'} ? '입장완료' : '입장권'">입장권</span>
        </div>
        <div style="display:flex;gap:14px;margin-top:14px;align-items:center;">
            <div style="background:#fff;border-radius:8px;padding:7px;line-height:0;">
                <img th:src="@{/customer/reservations/{id}/qr(id=${reservation.id})}" alt="입장 QR" width="96" height="96">
            </div>
            <div>
                <div style="font-size:15px;font-weight:500;color:#fff;" th:text="${reservation.expo.title}">행사</div>
                <div style="font-size:12px;color:#9db2c2;margin-top:2px;"
                     th:text="${reservation.expo.startAt != null} ? ${#temporals.format(reservation.expo.startAt, 'M월 d일 HH:mm')} : ''">일정</div>
                <div class="mono" style="font-size:12px;color:var(--cyan);margin-top:8px;"
                     th:text="${reservation.reservationNo} + ' · ' + ${reservation.headcount} + '인'">번호</div>
            </div>
        </div>
        <div class="ticket__perf">
            <span class="mono" style="font-size:11px;color:#9db2c2;">CODE</span>
            <span class="mono" style="font-size:12px;color:#EAF2F6;" th:text="${reservation.checkinToken}">TOKEN</span>
        </div>
    </div>

    <div class="panel">
        <div class="info-row"><span class="label">예약번호</span><span class="mono" th:text="${reservation.reservationNo}">RSV</span></div>
        <div class="info-row"><span class="label">행사</span><span th:text="${reservation.expo.title}">행사</span></div>
        <div class="info-row"><span class="label">인원</span><span th:text="${reservation.headcount} + '명'">1명</span></div>
        <div class="info-row"><span class="label">결제 금액</span>
            <span class="price" th:text="${#numbers.formatInteger(reservation.amount, 0, 'COMMA')} + '원'">0원</span></div>
        <div class="info-row"><span class="label">예약 일시</span>
            <span th:text="${#temporals.format(reservation.createdAt, 'yyyy-MM-dd HH:mm')}">-</span></div>
    </div>
</main>

<!-- 데모 모드: 카카오페이 결제창 열고 닫기 -->
<script th:unless="${portoneEnabled}">
    function openKakao() { document.getElementById('kakaoModal').hidden = false; }
    function closeKakao() { document.getElementById('kakaoModal').hidden = true; }
</script>

<script th:if="${portoneEnabled}" src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<script th:if="${portoneEnabled}" th:inline="javascript">
    const STORE_ID = [[${storeId}]];
    const CHANNEL_KEY = [[${channelKey}]];
    const RID = [[${reservation.id}]];
    const AMOUNT = [[${reservation.amount}]];
    const ORDER = [[${reservation.expo.title}]];

    async function payWithKakao() {
        const paymentId = "rsv-" + RID + "-" + Date.now();
        try {
            const res = await PortOne.requestPayment({
                storeId: STORE_ID, channelKey: CHANNEL_KEY, paymentId: paymentId,
                orderName: "박람회 예약 · " + ORDER, totalAmount: AMOUNT,
                currency: "CURRENCY_KRW", payMethod: "EASY_PAY",
                redirectUrl: window.location.origin + "/customer/reservations/" + RID + "/pay/complete"
            });
            if (res && res.code != null) { alert("결제 실패: " + res.message); return; }
            window.location.href = "/customer/reservations/" + RID + "/pay/complete?paymentId=" + encodeURIComponent(res.paymentId);
        } catch (e) { alert("결제 중 오류가 발생했습니다: " + e.message); }
    }
</script>
</body>
</html>
