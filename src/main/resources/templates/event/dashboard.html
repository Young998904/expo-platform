<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">박람회 관리자 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/layout :: eventSidebar('dashboard')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/layout :: topbar('박람회 관리자 대시보드')}"></header>
        <main class="content">
            <div class="content-head">
                <h1 class="page-title">담당 박람회 콘솔</h1>
                <span class="eyebrow">EVENT · KPI</span>
            </div>

            <div class="kpi-grid">
                <div class="kpi"><div class="kpi__label">예약 수</div><div class="kpi__value">0</div></div>
                <div class="kpi"><div class="kpi__label">결제 금액</div><div class="kpi__value">0<small>원</small></div></div>
                <div class="kpi"><div class="kpi__label">체크인율</div><div class="kpi__value">0<small>%</small></div></div>
                <div class="kpi"><div class="kpi__label">좌석 소진율</div><div class="kpi__value">0<small>%</small></div></div>
            </div>

            <div class="panel">
                <h2>담당 박람회 운영</h2>
                <p>예약자 명단·체크인·콘텐츠 편집·교육 수강이 이 콘솔에 구현됩니다.</p>
            </div>
        </main>
    </div>
</div>
</body>
</html>
