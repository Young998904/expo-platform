<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">박람회 관리자 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/layout :: eventSidebar('dashboard')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/layout :: topbar('박람회 관리자 대시보드')}"></header>
        <main class="content">
            <div class="content-head">
                <h1 class="page-title" th:text="${dash.hasExpo} ? ${dash.expoTitle} : '담당 박람회'">담당 박람회 콘솔</h1>
                <span class="eyebrow">EVENT · KPI</span>
            </div>

            <div th:if="${dash.hasExpo}">
                <div class="kpi-grid">
                    <div class="kpi"><div class="kpi__label">예약 건수</div>
                        <div class="kpi__value" th:text="${dash.reservationCount}">0</div></div>
                    <div class="kpi"><div class="kpi__label">결제 금액</div>
                        <div class="kpi__value" th:text="${#numbers.formatInteger(dash.paidAmount, 0, 'COMMA')}">0<small>원</small></div></div>
                    <div class="kpi"><div class="kpi__label">체크인율</div>
                        <div class="kpi__value" th:text="${dash.checkinRate} + '%'">0<small>%</small></div></div>
                    <div class="kpi"><div class="kpi__label">좌석 소진율</div>
                        <div class="kpi__value" th:text="${dash.seatUsageRate} + '%'">0<small>%</small></div></div>
                </div>
                <div class="panel">
                    <h2>좌석 현황</h2>
                    <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);">
                        <span>점유</span><span class="mono" th:text="(${dash.capacity} - ${dash.remaining}) + ' / ' + ${dash.capacity}">0 / 0</span>
                    </div>
                    <div class="meter" style="margin-top:6px;"><div class="meter__fill" th:style="'width:' + ${dash.seatUsageRate} + '%'"></div></div>
                    <a class="btn" style="margin-top:14px;" th:href="@{/event/reservations}">예약자 명단 보기</a>
                </div>
            </div>
            <div class="panel" th:unless="${dash.hasExpo}">
                <div class="table-empty">담당 박람회가 지정되지 않았습니다.</div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
