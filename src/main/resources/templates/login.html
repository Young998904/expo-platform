<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 박람회 예약 관리 플랫폼</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
<main style="width:340px;padding:0 16px;">
    <div style="text-align:center;margin-bottom:20px;">
        <div style="font-family:var(--font-disp);font-weight:700;font-size:26px;color:var(--ink);">expo<span style="color:var(--cyan);">·console</span></div>
        <p class="eyebrow" style="margin-top:4px;">GATE · 관리자 로그인</p>
    </div>

    <div class="panel">
        <div th:if="${param.error}" class="flash error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.logout}" class="flash success">로그아웃되었습니다.</div>

        <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:10px;">
            <input type="text" name="username" placeholder="아이디" required autofocus>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit" class="btn primary" style="justify-content:center;padding:10px;">로그인</button>
        </form>
    </div>
    <p style="text-align:center;color:var(--text-faint);font-size:12px;">시연 계정 · <span class="mono">admin / admin123</span></p>
</main>
</body>
</html>
